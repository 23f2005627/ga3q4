name: Daily Repository Update

on:
  schedule:
    - cron: '17 3 * * *'   # Runs daily at 03:17 UTC (specific time, no wildcards)
  workflow_dispatch:        # Allows manual trigger

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 23f2005627@ds.study.iitm.ac.in - Generate daily update
        run: |
          echo "Last update: $(date -u)" > daily-log.txt
          
      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add daily-log.txt
          git commit -m "Automated daily update: $(date -u)" || echo "No changes to commit"
          git push
